# Mathpresso Notion Skill Configuration
# 이 파일을 config.yaml로 복사하여 사용하세요

# ===========================================
# Git Author → Notion User 매핑
# ===========================================
# Git commit author 이름/이메일을 Notion 사용자 ID로 매핑
# Notion 사용자 ID는 notion-get-users 도구로 조회 가능

user_mapping:
  # 예시 (실제 값으로 교체하세요)
  # "Git Author Name": "notion-user-id"
  # "email@company.com": "notion-user-id"

  "Hong Gildong": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  "hong@mathpresso.com": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

  # 추가 팀원들...
  # "Kim Cheolsu": "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy"

# ===========================================
# Git Task Sync 설정
# ===========================================
git_task_sync:
  # 커밋 그룹핑 방식
  grouping:
    enabled: true
    by: "branch"  # branch | day | feature | none

  # Epic 자동 매칭
  epic_matching:
    enabled: true
    # create_without_epic: Epic 없이 생성 (나중에 수동 연결)
    # skip: Epic 없으면 생성하지 않음
    # ask: 사용자에게 물어봄
    fallback: "create_without_epic"

  # 제외할 커밋 패턴 (정규식)
  exclude_patterns:
    - "^Merge "
    - "^Revert "
    - "^chore: bump version"
    - "^chore\\(release\\)"
    - "^ci:"
    - "^docs: update changelog"

  # 최소 변경 라인 수 (너무 작은 커밋 제외)
  min_changes: 10

  # Task 이름에 커밋 해시 포함 여부
  include_commit_hash: false

# ===========================================
# 커밋 분할 설정 (Large Commit Splitting)
# ===========================================
commit_splitting:
  enabled: true

  # 분할 트리거 조건 (하나라도 충족 시 분할 고려)
  triggers:
    # 여러 Parts가 감지된 경우
    multiple_parts: true

    # 커밋 메시지에 bullet points/번호 목록이 있는 경우
    message_has_list: true

    # 변경 라인 수 임계값 (이상일 때 분할 고려)
    min_lines_for_split: 300

    # 변경 파일 수 임계값
    min_files_for_split: 5

  # 분할 방식
  split_by:
    # Parts 기준 분할 (BE, FE, QA 등)
    parts: true

    # 디렉토리 기준 분할
    directory: true

    # 커밋 메시지 파싱 기준 분할
    message_items: true

  # 분할 전 사용자 확인 여부
  # always: 항상 확인
  # threshold: 임계값 초과 시만 확인
  # never: 확인 없이 자동 분할
  confirm_before_split: "threshold"

  # 확인 없이 분할하는 임계값
  auto_split_threshold:
    min_parts: 3        # Parts가 3개 이상이면 자동 분할
    min_total_lines: 500

  # 분할 시 Task 간 관계 설정
  link_split_tasks: true  # 분할된 Task들을 서로 연결할지

# ===========================================
# Parts 추론 규칙 (경로 패턴 → Parts)
# ===========================================
parts_inference:
  # 매스프레소 프로젝트 구조에 맞게 커스터마이즈
  rules:
    - pattern: "*/api/*"
      parts: "Backend"
    - pattern: "*/server/*"
      parts: "Backend"
    - pattern: "*/backend/*"
      parts: "Backend"

    - pattern: "*/web/*"
      parts: "Frontend"
    - pattern: "*/pages/*"
      parts: "Frontend"
    - pattern: "*/components/*"
      parts: "Frontend"

    - pattern: "*/ios/*"
      parts: "Client"
    - pattern: "*/android/*"
      parts: "Client"
    - pattern: "*/app/*"
      parts: "Client"

    - pattern: "*/infra/*"
      parts: "DevOps"
    - pattern: "*/deploy/*"
      parts: "DevOps"
    - pattern: "*/k8s/*"
      parts: "DevOps"
    - pattern: "Dockerfile"
      parts: "DevOps"
    - pattern: ".github/workflows/*"
      parts: "DevOps"

    - pattern: "*/ml/*"
      parts: "AI"
    - pattern: "*/model/*"
      parts: "AI"
    - pattern: "*/ai/*"
      parts: "AI"

    - pattern: "*/data/*"
      parts: "Data"
    - pattern: "*/analytics/*"
      parts: "Data"

    - pattern: "*/test/*"
      parts: "QA"
    - pattern: "*_test.*"
      parts: "QA"
    - pattern: "*.spec.*"
      parts: "QA"

# ===========================================
# Size 추정 규칙 (변경 라인 수 → Size)
# ===========================================
size_estimation:
  rules:
    - max_lines: 50
      size: "1H"
    - max_lines: 150
      size: "2H"
    - max_lines: 300
      size: "4H"
    - max_lines: 500
      size: "1D"
    - max_lines: 1000
      size: "2D"
    - max_lines: 2000
      size: "3D"
    - max_lines: 999999
      size: "5D"

# ===========================================
# 브랜치 → Epic 매칭 패턴
# ===========================================
branch_epic_patterns:
  # 브랜치명에서 Epic 키워드 추출 패턴
  patterns:
    - regex: "epic/(.+)"
      extract: 1  # 캡처 그룹 번호
    - regex: "feature/([^-]+)"
      extract: 1
    - regex: "EPIC-([0-9]+)"
      extract: 0  # 전체 매치

  # 특정 브랜치 → Epic 직접 매핑
  direct_mapping:
    # "branch-name": "epic-page-id"
    # "feature/user-auth": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# ===========================================
# 기본값
# ===========================================
defaults:
  task:
    status: "Done"  # Git backfill로 생성 시 기본 상태
    priority: "P2"

  epic:
    status: "In progress"
    priority: "P1"
